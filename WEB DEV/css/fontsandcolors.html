<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fonts and colors</title>
  <style>
    body{
      background-color: blueviolet;
    }
    h1{
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 30px;
      font-weight: bold;
      font-style: italic;
      line-height: normal;
    }
    p{
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 20px;
      font-weight: lighter;
      font-style: italic;
      line-height: normal;
    }
    #first{
      color: rgba(19, 22, 26, 0.827);
    }
    #second{
      color: rgba(240, 34, 168, 0.827);
    }
    #third{
      color: rgba(208, 189, 94, 0.827);
    }
  </style>
</head>
<body>
  <h1> this is the file for learning fonts and colors in css</h1>
    <p id="first"> this is the paragraph for
          learning fonts and
                 colors in css</p>
    <p id="second">hiiiiii madam ! today is april 5
       and papa is gonna retire by 3 years
      </p>
      <p id="third"> i am kinda afraid and lill afraid will i able to make it at the end???</p>
</body>
</html>
